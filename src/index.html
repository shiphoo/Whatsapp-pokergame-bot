<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>WhatsApp QR</title>
		<style>
			body {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				height: 100vh;
				font-family: sans-serif;
			}
			img {
				width: 300px;
				height: 300px;
				margin-top: 20px;
			}
		</style>
	</head>
	<body>
		<h2>Scan WhatsApp QR</h2>
		<img id="qr" src="" alt="QR code" />

		<script>
			async function updateQR() {
				try {
					const res = await fetch("/qr");
					const qrDataUrl = await res.text();
					document.getElementById("qr").src = qrDataUrl;
				} catch (err) {
					console.error(err);
				}
			}

			// Update QR every 2 seconds
			setInterval(updateQR, 2000);
			updateQR();
		</script>
	</body>
</html>
